{% extends "base.html" %}
{% block title %}{{ 'Editar venda' if sale else 'Nova venda' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-4">{{ 'Editar venda' if sale else 'Nova venda' }}</h1>
        <form method="post" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Cliente</label>
            <select class="form-select" name="client_id" required>
              {% for client in clients %}
              <option value="{{ client.id }}" {% if sale and sale.client_id == client.id %}selected{% endif %}>{{ client.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Produto</label>
            <select class="form-select" name="product_id" required>
              {% for product in products %}
              <option value="{{ product.id }}" {% if sale and sale.product_id == product.id %}selected{% endif %}>{{ product.name }} · {{ product.price|brl }} · saldo {{ product.stock_qty }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Quantidade</label>
            <input class="form-control" type="number" min="1" name="quantity" value="{{ sale.quantity if sale else '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Data da venda</label>
            <input class="form-control" type="date" name="sale_date" value="{{ sale.sale_date if sale else request.form.get('sale_date', '') }}">
          </div>
          <div class="col-md-4">
            <label class="form-label">Status pagamento</label>
            <select class="form-select" name="payment_status">
              <option value="receber" {% if sale and sale.payment_status == 'receber' %}selected{% endif %}>A receber</option>
              <option value="pago" {% if sale and sale.payment_status == 'pago' %}selected{% endif %}>Pago</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Observações</label>
            <textarea class="form-control" name="notes" rows="3">{{ sale.notes if sale else '' }}</textarea>
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary">{{ 'Atualizar venda' if sale else 'Salvar venda' }}</button>
            <a href="{{ url_for('sales_list') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
