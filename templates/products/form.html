{% extends "base.html" %}
{% block title %}{{ 'Editar produto' if product else 'Novo produto' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-4">{{ 'Editar produto' if product else 'Novo produto' }}</h1>
        <form method="post" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nome</label>
            <input class="form-control" name="name" value="{{ product.name if product else '' }}" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">SKU</label>
            <input class="form-control" name="sku" value="{{ product.sku if product else '' }}" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Categoria</label>
            <input class="form-control" name="category" value="{{ product.category if product else '' }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Preço de venda</label>
            <input class="form-control" type="number" step="0.01" min="0" name="price" value="{{ product.price if product else '' }}" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Custo</label>
            <input class="form-control" type="number" step="0.01" min="0" name="cost" value="{{ product.cost if product else '' }}" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Estoque atual</label>
            <input class="form-control" type="number" min="0" name="stock_qty" value="{{ product.stock_qty if product else 0 }}" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Estoque mínimo</label>
            <input class="form-control" type="number" min="0" name="min_stock" value="{{ product.min_stock if product else 0 }}" required>
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('products_list') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
