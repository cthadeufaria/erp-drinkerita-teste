{% extends "base.html" %}
{% block title %}{{ 'Editar cliente' if client else 'Novo cliente' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-4">{{ 'Editar cliente' if client else 'Novo cliente' }}</h1>
        <form method="post" class="row g-3">
          <div class="col-md-8">
            <label class="form-label">Nome</label>
            <input class="form-control" name="name" value="{{ client.name if client else '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Documento</label>
            <input class="form-control" name="document" value="{{ client.document if client else '' }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">E-mail</label>
            <input class="form-control" type="email" name="email" value="{{ client.email if client else '' }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Telefone</label>
            <input class="form-control" name="phone" value="{{ client.phone if client else '' }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Cidade</label>
            <input class="form-control" name="city" value="{{ client.city if client else '' }}">
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('clients_list') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
